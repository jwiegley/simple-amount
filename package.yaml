name:        simple-amount
version:     0.2.0
license:     BSD3
author:      John Wiegley
maintainer:  johnw@newartisans.com
description: Fractional amounts represented by rational numbers.

ghc-options:
  - -Wall
  - -Wcompat
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wredundant-constraints

dependencies:
  - base >= 4.5 && < 5.0
  - aeson
  - data-default
  - deepseq
  - lens
  - pretty-show
  - pretty
  - profunctors
  - split
  - text
  - time
  - transformers

library:
  source-dirs: src
  c-sources:
    - src/mpfr_printf.c
  extra-libraries:
    - mpfr
    - gmp
  exposed-modules:
    - Amount

tests:
  simple-amount-tests:
    main: Main.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - '"-with-rtsopts=-N"'
    dependencies:
      - simple-amount
      - HUnit
      - hedgehog
      - tasty
      - tasty-hedgehog
      - tasty-hunit

benchmarks:
  simple-amount-bench:
    main: Main.hs
    source-dirs: bench
    ghc-options:
      - -threaded
      - -rtsopts
      - '"-with-rtsopts=-N"'
    dependencies:
      - simple-amount
      - tasty
      - tasty-bench
